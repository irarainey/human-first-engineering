title: Human-First Engineering
tagline: "Principles and practices for growing engineers in an AI-enabled world."
description: Growing engineers in the age of AI. Tools evolve. Craft endures.
url: https://humanfirstengineering.dev
remote_theme: just-the-docs/just-the-docs
color_scheme: dark

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings

relative_links:
  enabled: true
  collections: true

# Just the Docs configuration
search_enabled: false

heading_anchors: true

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
