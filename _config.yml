title: Human-First Engineering
description: Growing engineers in the age of AI. Tools evolve. Craft endures.
url: https://humanfirstengineering.dev
theme: jekyll-theme-cayman

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings

relative_links:
  enabled: true
  collections: true

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - LICENSE.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
