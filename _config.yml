title: Human-First Engineering
description: Growing engineers in the age of AI. Tools evolve. Craft endures.
url: https://humanfirstengineering.dev
remote_theme: just-the-docs/just-the-docs
color_scheme: dark

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings

relative_links:
  enabled: true
  collections: true

# Just the Docs configuration
search_enabled: true
search:
  heading_level: 3
  previews: 2
  preview_words_before: 3
  preview_words_after: 3

heading_anchors: true

aux_links:
  "View on GitHub":
    - "https://github.com/irarainey/human-first-engineering"

aux_links_new_tab: true

footer_content: "Human-First Engineering &middot; <a href=\"https://github.com/irarainey/human-first-engineering\">Source on GitHub</a>"

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - LICENSE.md
  - README.md
  - CHANGELOG.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
